<!DOCTYPE html>
<html>
<head>
  <title>Virtual Exhibition</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    .hall {
      position: relative;
      width: 700px;
      margin: auto;
    }

    .hall img {
      width: 100%;
    }

    .stall {
      position: absolute;
      cursor: pointer;
    }

    .stall:hover {
      border: 2px solid red;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      width: 300px;
      box-shadow: 0 0 10px gray;
    }

    .overlay {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<h1>🔬 Virtual Science Exhibition</h1>

<div class="hall">
  <img src="https://i.imgur.com/7bKQ8Kf.jpg">

  <div class="stall" style="top:50px; left:100px; width:100px; height:100px;"
       onclick="openPopup('AI Project')"></div>

  <div class="stall" style="top:200px; left:300px; width:100px; height:100px;"
       onclick="openPopup('Robotics')"></div>
</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">
  <h2 id="title"></h2>

  <input id="msg" placeholder="Ask something">
  <button onclick="sendMessage()">Send</button>

  <ul id="chat"></ul>

  <button onclick="closePopup()">Close</button>
</div>

<script>
let currentStall = "";

function openPopup(name) {
  currentStall = name;
  document.getElementById("title").innerText = name;

  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";

  loadMessages();
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

function sendMessage() {
  let msg = document.getElementById("msg").value;

  fetch("http://localhost:3000/message", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text: msg, stall: currentStall })
  }).then(() => {
    document.getElementById("msg").value = "";
    loadMessages();
  });
}

function loadMessages() {
  fetch("http://localhost:3000/messages")
    .then(res => res.json())
    .then(data => {
      let chat = document.getElementById("chat");
      chat.innerHTML = "";

      data
        .filter(m => m.stall === currentStall)
        .forEach(m => {
          chat.innerHTML += `<li>${m.text}</li>`;
        });
    });
}
</script>

</body>
</html>
