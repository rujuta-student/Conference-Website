<!DOCTYPE html>

<head>
  <title>Schedule - NovaSphere</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .schedule-container {
      padding: 80px 40px;
    }

    h1 {
      text-align: center;
      color: #ff5e00;
      margin-bottom: 40px;
    }

    /* DAY ROW */
    .day-row {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      margin-bottom: 30px;
    }

    .day-btn {
      min-width: 130px;
      padding: 12px;
      background: #111;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .day-btn.active { background: #ff5e00; box-shadow: 0 0 15px rgba(255,94,0,0.6); }

    /* ROOM ROW */
    .room-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    .room-btn {
      padding: 10px 20px;
      background: #111;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .room-btn.active { background: #ff5e00; }

    /* EVENT CARDS - VERTICAL STACK */
    .event-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .event-card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid #222;
      transition: 0.3s;
    }

    .event-card:hover {
      transform: translateY(-5px) scale(1.02);
      border: 1px solid #ff5e00;
      box-shadow: 0 0 25px rgba(255,94,0,0.6);
    }

    .time { color: #ff5e00; font-weight: bold; margin-bottom: 8px; }
    .title { font-size: 1.3rem; font-weight: 600; margin-bottom: 10px; }
    .event-card p { color: #aaa; font-size: 0.9rem; margin: 4px 0; }
    .tag { display: inline-block; margin-top: 10px; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; background: #ff5e00; box-shadow: 0 0 10px rgba(255,94,0,0.5); }

    /* Optional scrollbar styling */
    .event-container::-webkit-scrollbar {
      width: 6px;
    }
    .event-container::-webkit-scrollbar-thumb {
      background: #ff5e00;
      border-radius: 3px;
    }
  </style>
</head>

// INIT
const daysDiv = document.getElementById("days");
const roomsDiv = document.getElementById("rooms");
const eventsDiv = document.getElementById("events");

Object.keys(data).forEach((day, index) => {
  let btn = document.createElement("div");
  btn.className = "day-btn";
  btn.innerText = day;
  btn.onclick = () => selectDay(day, btn);
  if(index===0) { btn.classList.add("active"); selectDay(day, btn); }
  daysDiv.appendChild(btn);
});

function selectDay(day, element){
  document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
  element.classList.add("active");
  roomsDiv.innerHTML="";
  Object.keys(data[day]).forEach((room,index)=>{
    let btn = document.createElement("div");
    btn.className="room-btn";
    btn.innerText=room;
    btn.onclick=()=>selectRoom(day,room,btn);
    if(index===0){ btn.classList.add("active"); selectRoom(day,room,btn); }
    roomsDiv.appendChild(btn);
  });
}

function selectRoom(day,room,element){
  document.querySelectorAll(".room-btn").forEach(b=>b.classList.remove("active"));
  element.classList.add("active");
  eventsDiv.innerHTML="";
  data[day][room].forEach(event=>{
    let card=document.createElement("div");
    card.className="event-card";
    card.innerHTML=`
      <div class="time">${event.time}</div>
      <div class="title">${event.title}</div>
      <p><strong>Speaker:</strong> ${event.speaker}</p>
      <p><strong>Chair:</strong> ${event.chair}</p>
      <span class="tag">${event.type}</span>
    `;
    eventsDiv.appendChild(card);
  });
}
